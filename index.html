<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Por: Gabr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Agbalumo&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],display:['Agbalumo','cursive']},colors:{dark:{900:'#18181b',800:'#27272a',700:'#3f3f46',600:'#52525b'},brand:{400:'#60a5fa',500:'#3b82f6',600:'#2563eb'}}}}};
    </script>
    <style>
        /* Travas de Segurança CSS */
        body {
            background-color:#18181b;
            color:#e2e8f0;
            overflow-x:hidden;
            -webkit-user-select:none !important;
            -moz-user-select:none !important;
            -ms-user-select:none !important;
            user-select:none !important;
        }
        img {
            -webkit-user-drag:none !important;
            user-drag:none !important;
            pointer-events:none !important;
        }
        .pointer-events-auto {pointer-events:auto !important;}
        
        /* Estilização Scroll */
        ::-webkit-scrollbar {width:8px;}
        ::-webkit-scrollbar-track {background:#18181b;}
        ::-webkit-scrollbar-thumb {background:#3f3f46;border-radius:4px;}
        ::-webkit-scrollbar-thumb:hover {background:#3b82f6;}
        
        /* Efeitos Visuais */
        .card-hover {transition:all 0.3s cubic-bezier(0.4,0,0.2,1);}
        .card-hover:hover {transform:translateY(-5px);box-shadow:0 10px 25px -5px rgba(0,0,0,0.5);border-color:#3b82f6;}
        .text-gradient {background:linear-gradient(to right,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:hue 5s infinite linear;}
        @keyframes hue {from {filter:hue-rotate(0deg);} to {filter:hue-rotate(360deg);}}
        .submenu-transition {transition:max-height 0.3s ease-in-out,opacity 0.3s ease-in-out;max-height:0;opacity:0;overflow:hidden;}
        .submenu-open {max-height:500px;opacity:1;}
        .rotate-180 {transform:rotate(180deg);}
        @media print {html,body {display:none !important;}}

        .banner-glass {
            background: rgba(39, 39, 42, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(96, 165, 250, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(59, 130, 246, 0.1);
        }
        .banner-text {
            font-family: 'Agbalumo', cursive;
            background: linear-gradient(to right, #60a5fa, #a78bfa, #f472b6, #60a5fa);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 4s linear infinite;
        }
        @keyframes flow {
            0% { background-position: 0% center; }
            100% { background-position: 100% center; }
        }

        /* Alerta de Segurança */
        #security-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(39, 39, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #3b82f6;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            opacity: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(59, 130, 246, 0.4);
            white-space: nowrap;
        }
        #security-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="flex h-screen w-full antialiased">

    <div id="security-toast">
        <i class="ph ph-warning-octagon mr-2 text-brand-400"></i> Copyright - Acesso Proibido
    </div>

    <aside class="w-20 lg:w-64 flex-shrink-0 bg-dark-800 border-r border-dark-700 flex flex-col h-full z-20 shadow-xl overflow-hidden">
        <div class="flex-shrink-0 p-4 flex flex-row items-center border-b border-dark-700 bg-dark-800/90 relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-r from-brand-600/10 to-transparent pointer-events-none"></div>
            <img src="https://i.imgur.com/Z8OtVir.jpeg" class="w-12 h-12 rounded-full border-2 border-brand-500 object-cover shadow-lg relative z-10 flex-shrink-0 pointer-events-auto" style="pointer-events: auto !important;">
            <div class="ml-3 hidden lg:block relative z-10 flex-1 min-w-0">
                <p class="text-sm font-bold text-white tracking-wide leading-tight truncate">Nome</p>
                <p class="text-xs text-brand-400 mt-0.5 truncate">ID: 123456</p>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto w-full overflow-x-hidden">
            <nav class="p-3 space-y-1 w-full">
                <button onclick="changeView('home')" id="nav-home" class="nav-btn w-full flex items-center p-2 lg:p-3 rounded-lg text-gray-300 hover:text-white hover:bg-dark-700 transition-colors group active-nav">
                    <i class="ph ph-squares-four text-xl lg:text-2xl group-hover:text-brand-500 transition-colors flex-shrink-0"></i>
                    <span class="hidden lg:block ml-3 font-medium text-sm truncate">Início</span>
                </button>
                <p class="hidden lg:block px-3 text-[10px] sm:text-xs font-semibold text-gray-500 uppercase tracking-wider mt-6 mb-2 truncate">Categorias</p>
                <div class="w-full">
                    <button onclick="toggleMenu('gifs')" class="w-full flex items-center p-2 lg:p-3 rounded-lg text-gray-300 hover:text-white hover:bg-dark-700 transition-colors group">
                        <i class="ph ph-gif text-xl lg:text-2xl text-brand-400 flex-shrink-0"></i>
                        <span class="hidden lg:block ml-3 font-medium text-sm truncate">GIFS</span>
                        <i id="gifs-caret" class="ph ph-caret-down hidden lg:block ml-auto transition-transform duration-300 flex-shrink-0"></i>
                    </button>
                    <div id="gifs-submenu" class="submenu-transition hidden lg:flex flex-col space-y-1 mt-1 border-l-2 border-dark-700 ml-5 pl-2 w-full">
                        <button onclick="changeView('gifs-new')" id="nav-gifs-new" class="nav-btn w-full flex items-center p-2 rounded-lg text-gray-400 hover:text-white hover:bg-dark-700 transition-colors"><i class="ph ph-sparkle text-lg flex-shrink-0"></i><span class="ml-3 text-sm truncate">Novos</span></button>
                        <button onclick="changeView('gifs-girls')" id="nav-gifs-girls" class="nav-btn w-full flex items-center p-2 rounded-lg text-gray-400 hover:text-white hover:bg-dark-700 transition-colors"><i class="ph ph-crown text-lg flex-shrink-0"></i><span class="ml-3 text-sm truncate">Garotas</span></button>
                        <button onclick="changeView('gifs-boys')" id="nav-gifs-boys" class="nav-btn w-full flex items-center p-2 rounded-lg text-gray-400 hover:text-white hover:bg-dark-700 transition-colors"><i class="ph ph-soccer-ball text-lg flex-shrink-0"></i><span class="ml-3 text-sm truncate">Garotos</span></button>
                        <button onclick="changeView('gifs-dj')" id="nav-gifs-dj" class="nav-btn w-full flex items-center p-2 rounded-lg text-gray-400 hover:text-white hover:bg-dark-700 transition-colors"><i class="ph ph-headphones text-lg flex-shrink-0"></i><span class="ml-3 text-sm truncate">DJ</span></button>
                        <button onclick="changeView('gifs-lovers')" id="nav-gifs-lovers" class="nav-btn w-full flex items-center p-2 rounded-lg text-gray-400 hover:text-white hover:bg-dark-700 transition-colors"><i class="ph ph-heart text-lg flex-shrink-0"></i><span class="ml-3 text-sm truncate">Namorados</span></button>
                        <button onclick="changeView('gifs-christmas')" id="nav-gifs-christmas" class="nav-btn w-full flex items-center p-2 rounded-lg text-gray-400 hover:text-white hover:bg-dark-700 transition-colors"><i class="ph ph-tree-evergreen text-lg flex-shrink-0"></i><span class="ml-3 text-sm truncate">Natal</span></button>
                        <button onclick="changeView('gifs-halloween')" id="nav-gifs-halloween" class="nav-btn w-full flex items-center p-2 rounded-lg text-gray-400 hover:text-white hover:bg-dark-700 transition-colors"><i class="ph ph-ghost text-lg flex-shrink-0"></i><span class="ml-3 text-sm truncate">Halloween</span></button>
                        <button onclick="changeView('gifs-mixed')" id="nav-gifs-mixed" class="nav-btn w-full flex items-center p-2 rounded-lg text-gray-400 hover:text-white hover:bg-dark-700 transition-colors"><i class="ph ph-trophy text-lg flex-shrink-0"></i><span class="ml-3 text-sm truncate">Mistos</span></button>
                    </div>
                </div>
                <div class="w-full mt-2">
                    <button onclick="toggleMenu('pcback')" class="w-full flex items-center p-2 lg:p-3 rounded-lg text-gray-300 hover:text-white hover:bg-dark-700 transition-colors group">
                        <i class="ph ph-desktop text-xl lg:text-2xl text-brand-400 flex-shrink-0"></i>
                        <span class="hidden lg:block ml-3 font-medium text-sm truncate">PCBACK</span>
                        <i id="pcback-caret" class="ph ph-caret-down hidden lg:block ml-auto transition-transform duration-300 flex-shrink-0"></i>
                    </button>
                    <div id="pcback-submenu" class="submenu-transition hidden lg:flex flex-col space-y-1 mt-1 border-l-2 border-dark-700 ml-5 pl-2 w-full">
                        <button onclick="changeView('pcback-normal')" id="nav-pcback-normal" class="nav-btn w-full flex items-center p-2 rounded-lg text-gray-400 hover:text-white hover:bg-dark-700 transition-colors"><i class="ph ph-image-square text-lg flex-shrink-0"></i><span class="ml-3 text-sm truncate">Pcback Estático</span></button>
                        <button onclick="changeView('pcback-animados')" id="nav-pcback-animados" class="nav-btn w-full flex items-center p-2 rounded-lg text-gray-400 hover:text-white hover:bg-dark-700 transition-colors"><i class="ph ph-play-circle text-lg flex-shrink-0"></i><span class="ml-3 text-sm truncate">Pcback Gif</span></button>
                    </div>
                </div>
                <button onclick="changeView('fondo')" id="nav-fondo" class="nav-btn w-full flex items-center p-2 lg:p-3 rounded-lg text-gray-300 hover:text-white hover:bg-dark-700 transition-colors group mt-2">
                    <i class="ph ph-image text-xl lg:text-2xl group-hover:text-brand-500 transition-colors flex-shrink-0"></i>
                    <span class="hidden lg:block ml-3 font-medium text-sm truncate">Fundos</span>
                </button>
            </nav>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto relative flex flex-col w-full min-w-0" id="main-scroll-area">
        <header class="h-20 border-b border-dark-700 flex items-center px-4 md:px-8 sticky top-0 bg-dark-900/90 backdrop-blur-md z-10 w-full flex-shrink-0">
            <h1 id="page-title" class="text-xl md:text-2xl font-semibold text-white tracking-wide truncate w-full">Desenhos</h1>
        </header>

        <div id="welcome-banner" class="px-4 md:px-8 pt-6 w-full max-w-7xl mx-auto">
            <div class="banner-glass rounded-2xl p-8 md:p-12 flex items-center justify-center text-center border-b-4 border-brand-500/30">
                <h2 class="banner-text text-3xl md:text-5xl lg:text-6xl tracking-[0.15em] uppercase drop-shadow-2xl">
                    GIFS - PCBACK - PSTYLE - FUNDOS
                </h2>
            </div>
        </div>

        <div id="content-area" class="p-4 md:p-6 lg:p-8 w-full max-w-7xl mx-auto flex-1 min-w-0"></div>
    </main>

    <div id="lightbox" onclick="closeLightbox()" class="fixed inset-0 z-[100] hidden bg-black/95 backdrop-blur-sm flex items-center justify-center opacity-0 transition-opacity duration-300">
        <button onclick="event.stopPropagation(); closeLightbox()" class="absolute top-16 md:top-20 right-4 lg:right-8 text-gray-400 hover:text-white transition-colors bg-dark-800 hover:bg-brand-600 p-2 lg:p-3 rounded-full shadow-lg z-50">
            <i class="ph ph-x text-2xl lg:text-3xl"></i>
        </button>
        <button onclick="event.stopPropagation(); prevImage()" class="absolute left-2 sm:left-4 lg:left-8 text-gray-400 hover:text-white transition-colors bg-dark-800/80 hover:bg-brand-600 p-2 sm:p-3 lg:p-4 rounded-full shadow-lg z-50">
            <i class="ph ph-caret-left text-2xl lg:text-4xl"></i>
        </button>
        <button onclick="event.stopPropagation(); nextImage()" class="absolute right-2 sm:right-4 lg:right-8 text-gray-400 hover:text-white transition-colors bg-dark-800/80 hover:bg-brand-600 p-2 sm:p-3 lg:p-4 rounded-full shadow-lg z-50">
            <i class="ph ph-caret-right text-2xl lg:text-4xl"></i>
        </button>
        <div class="relative w-full max-w-[95vw] sm:max-w-[85vw] max-h-[85vh] flex flex-col items-center justify-center pointer-events-none">
            <img id="lightbox-img" class="max-h-[80vh] max-w-full object-contain drop-shadow-2xl rounded-lg pointer-events-auto" style="pointer-events: auto !important;">
            <div id="lightbox-caption" class="absolute -bottom-16 left-1/2 -translate-x-1/2 bg-brand-600 px-4 py-2 sm:px-6 sm:py-2 rounded-full text-white font-bold text-sm sm:text-base tracking-wide shadow-lg border border-brand-400 whitespace-nowrap"></div>
        </div>
    </div>

    <script>
        // Funções de Segurança Rigorosa
        function showSecurityAlert() {
            const toast = document.getElementById('security-toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        document.addEventListener('contextmenu', e => {
            e.preventDefault();
            showSecurityAlert();
        });

        document.addEventListener('keydown', e => {
            const isForbidden = (
                e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && (e.key === 'U' || e.key === 'S' || e.key === 'P' || e.key === 'C' || e.key === 'A')) ||
                (e.metaKey && (e.key === 'u' || e.key === 's' || e.key === 'p' || e.key === 'c' || e.key === 'a'))
            );
            if (isForbidden) {
                e.preventDefault();
                showSecurityAlert();
                return false;
            }
        });

        // Impede arrastar imagens globalmente
        document.addEventListener('dragstart', e => {
            if (e.target.tagName === 'IMG') {
                e.preventDefault();
                return false;
            }
        });

        const categoriesData = {
            'new': { marquee: "⭐ Gifs Novo Estilo Exclusivo ⭐", prefix: "Novo - ", items: Array(14).fill({url:""}) },
            'girls': { marquee: "👑 Gifs para Garotas 👑", prefix: "Garotas - ", items: Array(14).fill({url:""}) },
            'boys': { marquee: "⚽ Gifs para Garotos ⚽", prefix: "Garotos - ", items: Array(19).fill({url:""}) },
            'dj': { marquee: "🎧 DJ 🎧", prefix: "DJ - ", items: Array(12).fill({url:""}) },
            'lovers': { marquee: "❤️ Gifs para Namorados ❤️", prefix: "Amor - ", items: Array(18).fill({url:""}) },
            'christmas': { marquee: "🎅🏻 Gifs de Natal 🎅🏻", prefix: "Natal-", items: Array(22).fill({url:""}) },
            'halloween': { marquee: "🤡 Gifs de Halloween 🤡", prefix: "Hall-", items: Array(19).fill({url:""}) },
            'mixed': { marquee: "🏆 Gifs Mistos 🏆", prefix: "Mix-A-", items: Array(24).fill({url:""}) },
            'pcback-normal': { marquee: "🖥️ PCBACK 🖥️", prefix: "PC-", items: Array(34).fill({url:""}) },
            'pcback-animados': { marquee: "🖥️ PCBACK ANIMADOS 🖥️", prefix: "PCA-", items: Array(44).fill({url:""}) },
            'fondo': { marquee: "🖼️ FUNDOS 🖼️", prefix: "F-", items: Array(18).fill({url:""}) }
        };

        const contentArea = document.getElementById('content-area');
        const pageTitle = document.getElementById('page-title');
        let currentLightboxImages = [];
        let currentLightboxIndex = 0;

        function toggleMenu(id){const m=document.getElementById(id+'-submenu');const c=document.getElementById(id+'-caret');if(m.classList.contains('submenu-open')){m.classList.remove('submenu-open');c.classList.remove('rotate-180');}else{m.classList.add('submenu-open');c.classList.add('rotate-180');}}
        function updateActiveNav(id){document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('bg-dark-700','text-white');b.classList.add('text-gray-300');});const a=document.getElementById(`nav-${id}`);if(a){a.classList.add('bg-dark-700','text-white');a.classList.remove('text-gray-300');}}

        function initLazyLoad(){
            const imgs=document.querySelectorAll('.lazy-image');
            const obs=new IntersectionObserver((e,o)=>{e.forEach(en=>{if(en.isIntersecting){const i=en.target;if(i.getAttribute('data-src')){i.src=i.getAttribute('data-src');i.onload=()=>{i.classList.remove('opacity-0');i.classList.add('opacity-100');};}o.unobserve(i);}});},{rootMargin:"200px 0px",threshold:0.01});
            imgs.forEach(i=>obs.observe(i));
        }

        function generateGallery(k){
            const c=categoriesData[k];if(!c)return'';
            const g=['pcback-normal','pcback-animados','fondo'].includes(k);
            const cl=g?"grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 w-full":"grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-5 w-full";
            let h=`<div class="mb-12 w-full"><div class="flex items-center mb-6 md:mb-8"><div class="h-6 md:h-8 w-1.5 md:w-2 bg-brand-500 rounded-full mr-3 md:mr-4 shadow-[0_0_10px_rgba(59,130,246,0.6)]"></div><h2 class="text-lg md:text-2xl font-display text-white tracking-wide truncate">${c.marquee}</h2></div><div class="${cl}">`;
            const s="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E";
            for(let i=0;i<c.items.length;i++){
                let u=String(c.items[i].url||"").trim();let m=(u===""||u.includes("inserte"));
                let o=(!m&&g)?`onclick="openLightbox('${k}',${i})"`:"";
                if(g){
                    h+=`<div ${o} class="bg-dark-800 border border-dark-700 shadow-md rounded-xl p-2 md:p-3 flex flex-col items-center justify-center h-48 sm:h-56 md:h-64 hover:border-brand-500 hover:bg-dark-700 transition-all ${m?'cursor-default':'cursor-pointer'} group relative overflow-hidden"><span class="absolute top-2 left-2 md:top-3 md:left-3 bg-dark-900/90 px-1.5 py-0.5 md:px-2 md:py-1 rounded text-[10px] md:text-xs font-bold text-gray-400 group-hover:text-brand-400 transition-colors z-10 shadow-md">${c.prefix}${i+1}</span>`;
                    if(m){h+=`<div class="w-full h-full flex items-center justify-center font-display text-3xl md:text-5xl text-dark-600 font-bold opacity-30 group-hover:opacity-100 transition-opacity">${i+1}</div>`;}
                    else{h+=`<div class="w-full h-full flex items-center justify-center p-1 md:p-2 relative"><img data-src="${u}" src="${s}" draggable="false" class="lazy-image max-w-full max-h-full object-contain drop-shadow-lg opacity-0 transition-opacity duration-500" style="pointer-events: auto !important;"><div class="absolute inset-0 bg-brand-500/10 opacity-0 group-hover:opacity-100 transition-opacity rounded-xl flex items-center justify-center pointer-events-none"><i class="ph ph-arrows-out text-4xl md:text-5xl text-white drop-shadow-lg scale-50 group-hover:scale-100 transition-transform duration-300"></i></div></div>`;}
                }else{
                    h+=`<div class="bg-dark-800 border border-dark-700 shadow-md rounded-xl p-2 md:p-3 flex flex-col items-center justify-center h-32 md:h-40 hover:border-brand-500 hover:bg-dark-700 transition-all cursor-pointer group"><span class="text-[10px] md:text-xs font-bold text-gray-500 mb-1 md:mb-2 group-hover:text-brand-400 transition-colors">${c.prefix}${i+1}</span>`;
                    if(m){h+=`<div class="w-full flex-1 flex items-center justify-center font-display text-2xl md:text-4xl text-dark-600 font-bold opacity-30 group-hover:opacity-100 transition-opacity">${i+1}</div>`;}
                    else{h+=`<img data-src="${u}" src="${s}" draggable="false" class="lazy-image max-h-16 md:max-h-24 w-full object-contain drop-shadow-lg opacity-0 transition-opacity duration-500" style="pointer-events: auto !important;">`;}
                }
                h+=`</div>`;
            }
            h+=`</div></div>`;return h;
        }

        function openLightbox(k,o){
            const c=categoriesData[k];
            currentLightboxImages=c.items.map((i,x)=>({url:i.url,num:x+1,prefix:c.prefix})).filter(i=>i.url && !i.url.includes("inserte"));
            currentLightboxIndex=currentLightboxImages.findIndex(i=>i.num===(o+1));
            if(currentLightboxIndex===-1)return;
            showLightboxImage();
            const l=document.getElementById('lightbox');l.classList.remove('hidden');
            setTimeout(()=>l.classList.remove('opacity-0'),10);
        }

        function closeLightbox(){const l=document.getElementById('lightbox');l.classList.add('opacity-0');setTimeout(()=>l.classList.add('hidden'),300);}
        function nextImage(){if(currentLightboxImages.length===0)return;currentLightboxIndex=(currentLightboxIndex+1)%currentLightboxImages.length;showLightboxImage();}
        function prevImage(){if(currentLightboxImages.length===0)return;currentLightboxIndex=(currentLightboxIndex-1+currentLightboxImages.length)%currentLightboxImages.length;showLightboxImage();}
        function showLightboxImage(){const c=currentLightboxImages[currentLightboxIndex];document.getElementById('lightbox-img').src=c.url;document.getElementById('lightbox-caption').textContent=`${c.prefix}${c.num}`;}

        function changeView(v){
            updateActiveNav(v);contentArea.style.opacity=0;
            const banner = document.getElementById('welcome-banner');
            if(banner) banner.style.display = (v === 'home') ? 'block' : 'none';

            setTimeout(()=>{
                if(v==='home'){pageTitle.textContent="Desenhos";contentArea.innerHTML='<div class="text-center text-gray-500 mt-20">Selecione uma categoria para começar</div>';}
                else{
                    const k = v.replace('gifs-','').replace('pcback-','');
                    const c = categoriesData[v] || categoriesData[k];
                    if(c){
                        const t=c.marquee.replace(/[^a-zA-Z\s\-]/g,'').trim();
                        pageTitle.innerHTML=`Galeria <span class="text-gradient font-display tracking-widest ml-1 md:ml-2">${t}</span>`;
                        contentArea.innerHTML=generateGallery(v.startsWith('gifs-')?k:v);
                        initLazyLoad();
                    }
                }
                contentArea.style.opacity=1;
            },150);
        }

        document.addEventListener('DOMContentLoaded',()=>{
            changeView('home');
            const footer = document.createElement('div');
            footer.className = 'w-full py-4 md:py-6 text-center text-gray-700 text-[10px] md:text-xs font-semibold tracking-widest bg-dark-900 border-t border-dark-800 mt-auto select-none';
            footer.innerText = 'By: Gabr (1777777)';
            document.getElementById('main-scroll-area').appendChild(footer);
        });
    </script>
</body>
</html>
