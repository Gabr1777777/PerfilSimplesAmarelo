<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Profissional - Gabriel</title>
    <style>
        /* --- ESTILOS GERAIS --- */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* --- COMPONENTES --- */
        .profile-photo { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #00d9ff; object-fit: cover; }
        
        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            width: 100%;
            transition: 0.3s;
        }
        .btn.primary { background: #0088ff; border-color: #0088ff; }
        .btn:hover { background: #00d9ff; color: #0a0a0a; transform: scale(1.02); }

        .highlights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .highlight-item { width: 100%; padding-top: 100%; border-radius: 8px; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.1); }

        /* --- AMIGOS --- */
        .friends-list-container h3 { color: #00d9ff; margin-top: 0; font-size: 16px; border-bottom: 1px solid rgba(0,217,255,0.2); padding-bottom: 5px; }
        .friend-item { 
            background: rgba(255,255,255,0.1); 
            padding: 10px 12px; 
            border-radius: 5px; 
            margin-bottom: 8px; 
            font-size: 14px;
            border-left: 3px solid #00d9ff;
            cursor: pointer;
            transition: 0.2s;
        }
        .friend-item:hover { background: rgba(0, 217, 255, 0.1); }

        /* --- MODAIS --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #111;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #00d9ff;
            width: 320px;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
        }
        .modal-content input {
            width: 100%; padding: 10px; margin: 15px 0;
            background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box;
        }
        .info-line { margin: 10px 0; font-size: 14px; border-bottom: 1px solid #222; padding-bottom: 5px; display: flex; justify-content: space-between; }
        .info-line b { color: #00d9ff; }

        /* --- FEED --- */
        .publicacao {
            background: rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid #00d9ff;
            margin-top: 15px;
        }

        @media (max-width: 800px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="modalAmigo" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color: #00d9ff; margin-top: 0;">Novo Amigo</h3>
            <input type="text" id="nomeAmigoInput" placeholder="Nome do amigo...">
            <button class="btn primary" onclick="confirmarAdicionarAmigo()">Adicionar</button>
            <button class="btn" onclick="fecharModal('modalAmigo')">Cancelar</button>
        </div>
    </div>

    <div id="modalInfo" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color: #00d9ff; margin-top: 0;">Informações</h3>
            <div class="info-line"><span><b>Nome:</b></span> <span>Gabriel</span></div>
            <div class="info-line"><span><b>País:</b></span> <span>Brasil</span></div>
            <div class="info-line"><span><b>Idade:</b></span> <span>24 anos</span></div>
            <div class="info-line"><span><b>Nascimento:</b></span> <span>15/04/2002</span></div>
            <div class="info-line"><span><b>Signo:</b></span> <span>Áries</span></div>
            <button class="btn primary" style="margin-top: 15px;" onclick="fecharModal('modalInfo')">Fechar</button>
        </div>
    </div>

    <div class="main-container">
        
        <div class="profile-info">
            <div class="box" style="text-align: center;">
                <img src="https://i.imgur.com/Z8OtVir.jpeg" class="profile-photo">
                <p style="font-weight: bold; font-size: 20px; margin: 10px 0 0;">Gabriel</p>
            </div>

            <div class="box">
                <button class="btn primary" onclick="abrirModal('modalAmigo')">Adicionar Amigo</button>
                <button class="btn" onclick="abrirModal('modalInfo')">Info</button>
            </div>

            <div class="box">
                <h3>Destaques</h3>
                <div class="highlights-grid">
                    <div class="highlight-item" style="background-image: url('https://i.imgur.com/MXo7l6I.jpeg');"></div>
                    <div class="highlight-item" style="background-image: url('https://i.imgur.com/MXo7l6I.jpeg');"></div>
                    <div class="highlight-item" style="background-image: url('https://i.imgur.com/h3pyflh.jpeg');"></div>
                    <div class="highlight-item" style="background-image: url('https://i.imgur.com/aeyBhFj.jpeg');"></div>
                </div>
            </div>
        </div>

        <div class="feed-column">
            
            <div class="box friends-list-container">
                <h3>Amigos</h3>
                <div id="listaAmigos">
                    </div>
            </div>

            <div class="box">
                <p style="font-weight: bold; margin-top: 0;">Publicar</p>
                <input type="text" id="nomeUsuario" placeholder="Seu Nome:" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #000; border: 1px solid #333; color: white; box-sizing: border-box;">
                <textarea id="textoPost" rows="3" placeholder="No que você está pensando?" style="width: 100%; padding: 10px; border-radius: 5px; background: #000; border: 1px solid #333; color: white; box-sizing: border-box;"></textarea>
                <button class="btn primary" style="margin-top: 10px;" onclick="publicar()">Publicar</button>
            </div>

            <div id="feed"></div>
        </div>

    </div>

    <script>
        // --- FUNÇÕES DE MODAL ---
        function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
        function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- LÓGICA DE AMIGOS COM CONFIRMAÇÃO ---
        function confirmarAdicionarAmigo() {
            const nomeInput = document.getElementById('nomeAmigoInput');
            const lista = document.getElementById('listaAmigos');

            if (nomeInput.value.trim() === "") return;

            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerText = nomeInput.value;
            
            // NOVO: Função de clique com pergunta de confirmação
            div.onclick = function() {
                const pergunta = confirm("Remover " + this.innerText + " dos amigos?");
                if (pergunta) {
                    this.remove();
                }
            };
            
            lista.appendChild(div);
            nomeInput.value = "";
            fecharModal('modalAmigo');
        }

        // --- LÓGICA DO FEED 24H ---
        window.onload = carregarPosts;

        function publicar() {
            const nome = document.getElementById('nomeUsuario').value;
            const texto = document.getElementById('textoPost').value;
            const agora = Date.now();

            if (!nome || !texto) return alert("Preencha os campos!");

            const posts = JSON.parse(localStorage.getItem('feed_gabriel')) || [];
            posts.unshift({ nome, texto, data: agora });
            localStorage.setItem('feed_gabriel', JSON.stringify(posts));

            document.getElementById('textoPost').value = "";
            carregarPosts();
        }

        function carregarPosts() {
            const feed = document.getElementById('feed');
            const agora = Date.now();
            const posts = JSON.parse(localStorage.getItem('feed_gabriel')) || [];
            const validos = posts.filter(p => (agora - p.data) < 86400000); 
            
            localStorage.setItem('feed_gabriel', JSON.stringify(validos));
            feed.innerHTML = "";

            validos.forEach(p => {
                const d = document.createElement('div');
                d.className = 'publicacao';
                d.innerHTML = `<b style="color:#00d9ff">${p.nome}</b> publicou:<br><span style="color:#eee">${p.texto}</span>`;
                feed.appendChild(d);
            });
        }
    </script>
</body>
</html>
