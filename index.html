<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil Completo</title>
    <style>
        /* --- ESTILOS GERAIS E FUNDO --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a; /* Fundo escuro */
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* --- CONTAINER PRINCIPAL DO PERFIL --- */
        .main-container {
            display: grid;
            grid-template-columns: 300px 1fr; /* Coluna info / Coluna feed */
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* --- COLUNA ESQUERDA (INFO DO PERFIL) --- */
        .profile-info-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .box {
            background: rgba(255, 255, 255, 0.05); /* Efeito Vidro */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Foto de Perfil */
        .profile-photo-box { text-align: center; }
        .profile-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #00d9ff; /* Borda Neon */
            object-fit: cover;
            margin-bottom: 10px;
        }
        .profile-name { font-size: 20px; font-weight: bold; margin: 0; color: white; }

        /* Botões */
        .actions-box { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            display: block;
        }
        .btn:hover { background: #00d9ff; color: #0a0a0a; border-color: #00d9ff; }
        .btn.primary { background: #0088ff; border-color: #0088ff; }

        /* Sobre Mim */
        .about-box h3 { margin-top: 0; color: #00d9ff; border-bottom: 1px solid rgba(0, 217, 255, 0.2); padding-bottom: 5px; }
        .about-text { font-size: 14px; line-height: 1.5; color: #ccc; }

        /* Destaques (Fotos) */
        .highlights-box h3 { margin-top: 0; color: #00d9ff; border-bottom: 1px solid rgba(0, 217, 255, 0.2); padding-bottom: 5px; }
        .highlights-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 colunas para as fotos de destaque */
            gap: 10px;
        }
        .highlight-item {
            width: 100%;
            padding-top: 100%; /* Mantém formato quadrado */
            background: #222;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }
        .highlight-item:hover { transform: scale(1.05); border-color: #00d9ff; }

        /* --- COLUNA DIREITA (FEED) --- */
        .feed-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Área de Postagem */
        .post-creator-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .post-header { font-weight: bold; color: #ccc; margin-bottom: 5px; }
        
        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: #00d9ff; box-shadow: 0 0 8px rgba(0, 217, 255, 0.3); }
        
        .publish-btn {
            background: linear-gradient(45deg, #0088ff, #00d9ff);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .publish-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* Estilo das Publicações (Feed) */
        .feed-container { display: flex; flex-direction: column; gap: 15px; }
        .publicacao {
            background: rgba(255, 255, 255, 0.08);
            padding: 18px;
            border-radius: 12px;
            border-left: 5px solid #00d9ff;
            animation: slideIn 0.4s ease-out;
            position: relative;
        }
        .user-info { font-weight: bold; color: #00d9ff; font-size: 14px; }
        .user-info span { color: #aaa; font-weight: normal; font-size: 12px; margin-left: 5px; }
        .texto-publicacao { color: #efefef; line-height: 1.5; margin-top: 5px; word-wrap: break-word; }

        /* Animação */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Responsividade para telas menores */
        @media (max-width: 800px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="profile-info-column">
            
            <div class="box profile-photo-box">
                <img src="https://i.imgur.com/Z8OtVir.jpeg" alt="Foto de Perfil" class="profile-photo">
                <p class="profile-name">Nome do Perfil</p>
            </div>

            <div class="box actions-box">
                <button class="btn primary" onclick="alert('Ação: Adicionar Amigo')">Adicionar Amigo</button>
                <button class="btn" onclick="alert('Ação: Enviar Mensagem')">Mensagem</button>
                <a href="#" class="btn" onclick="alert('Ação: Ver Fotos')">Fotos</a>
            </div>

            <div class="box about-box">
                <h3>Sobre Mim</h3>
                <p class="about-text">Escreva aqui sua frase de destaque ou uma breve biografia sobre você. Este é o espaço para se apresentar e contar um pouco da sua história.</p>
            </div>

            <div class="box highlights-box">
                <h3>Destaques</h3>
                <div class="highlights-grid">
                    <div class="highlight-item" style="background-image: url('https://i.imgur.com/MXo7l6I.jpeg');"></div>
                    <div class="highlight-item" style="background-image: url('https://i.imgur.com/MXo7l6I.jpeg');"></div>
                    <div class="highlight-item" style="background-image: url('https://i.imgur.com/h3pyflh.jpeg');"></div>
                    <div class="highlight-item" style="background-image: url('https://i.imgur.com/aeyBhFj.jpeg');"></div>
                </div>
            </div>

        </div>

        <div class="feed-column">
            
            <div class="box post-creator-box">
                <div class="post-header">No que você está pensando?</div>
                <input type="text" id="nomeUsuario" placeholder="Seu Nome:">
                <textarea id="textoPost" rows="3" placeholder="Escreva algo..."></textarea>
                <button class="publish-btn" onclick="publicar()">Publicar</button>
            </div>

            <div id="feed" class="feed-container"></div>

        </div>

    </div>

    <script>
        // --- LÓGICA DO FEED 24H (LocalStorage) ---

        // Carrega as publicações assim que a página abre
        window.onload = carregarPosts;

        function publicar() {
            const nomeInput = document.getElementById('nomeUsuario');
            const textoInput = document.getElementById('textoPost');
            const tempoAtual = Date.now(); // Pega o horário em milissegundos

            // Validação simples
            if (!nomeInput.value || !textoInput.value) {
                alert("Por favor, preencha seu nome e a mensagem.");
                return;
            }

            // Cria o objeto da publicação
            const novoPost = {
                id: tempoAtual,
                nome: nomeInput.value,
                texto: textoInput.value,
                data: tempoAtual // Salva o horário exato da postagem
            };

            // Pega o que já existe no storage ou cria array vazio
            let posts = JSON.parse(localStorage.getItem('perfil_feed_completo_24h')) || [];
            
            // Adiciona o novo post no início da lista (para aparecer no topo)
            posts.unshift(novoPost);
            
            // Salva de volta no navegador
            localStorage.setItem('perfil_feed_completo_24h', JSON.stringify(posts));

            // Limpa o campo de texto
            textoInput.value = "";
            
            // Atualiza o feed na tela
            carregarPosts();
        }

        function carregarPosts() {
            const feed = document.getElementById('feed');
            const agora = Date.now();
            const vinteQuatroHoras = 24 * 60 * 60 * 1000; // Milissegundos em 1 dia (86.400.000 ms)

            // Pega os posts do storage
            let posts = JSON.parse(localStorage.getItem('perfil_feed_completo_24h')) || [];

            // FILTRO: Remove posts com mais de 24 horas
            const postsValidos = posts.filter(post => (agora - post.data) < vinteQuatroHoras);
            
            // Atualiza o banco local apenas com os válidos (para não carregar lixo)
            localStorage.setItem('perfil_feed_completo_24h', JSON.stringify(postsValidos));

            // Limpa o HTML do feed para renderizar a lista atualizada
            feed.innerHTML = "";

            // Cria o HTML para cada publicação válida
            postsValidos.forEach(post => {
                const div = document.createElement('div');
                div.className = 'publicacao';
                
                // Formatação simples de "tempo atrás"
                const minutosAtras = Math.floor((agora - post.data) / 60000);
                let tempoTexto = minutosAtras < 1 ? "Agora mesmo" : `há ${minutosAtras} min`;
                if (minutosAtras >= 60) {
                    tempoTexto = `há ${Math.floor(minutosAtras/60)}h`;
                }

                div.innerHTML = `
                    <div class="user-info">${post.nome} <span>publicou ${tempoTexto}:</span></div>
                    <div class="texto-publicacao">${post.texto}</div>
                `;
                feed.appendChild(div);
            });
        }
    </script>
</body>
</html>
